apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: authstacks.hops.ops.com.ai
spec:
  group: hops.ops.com.ai
  names:
    kind: AuthStack
    plural: authstacks
  scope: Namespaced
  versions:
  - name: v1alpha1
    referenceable: true
    served: true
    schema:
      openAPIV3Schema:
        description: |
          AuthStack installs Zitadel as the platform identity provider via the
          upstream `zitadel/zitadel` Helm chart. The chart's setup hook owns
          instance bootstrap (creates the default org plus `iam-admin` and
          `login-client` machine users with PATs in chart-managed secrets);
          this stack re-projects those secret references and the OIDC issuer
          URL into XR status so downstream consumers have a stable contract.

          Database modes (mutually exclusive):
            * `external` — bring your own DSN secret (managed Postgres, RDS, etc.)
            * `bundled`  — chart's bundled Bitnami subchart (LOCAL DEV ONLY)
            * `psqlStack` — compose with PSQLStack (RESERVED — pending PSQLDatabase XRD;
              currently rejected at composition time)

          Per-app OIDC client provisioning is out of scope; that lives with
          the Zitadel API or the future Zitadel Crossplane provider.
        type: object
        properties:
          spec:
            description: AuthStackSpec defines the desired state.
            type: object
            properties:
              clusterName:
                description: Name of the target cluster. Used as default for provider config refs.
                type: string
              managementPolicies:
                description: Management policies for all composed resources. Defaults to ["*"].
                type: array
                items:
                  type: string
                default:
                - "*"
              labels:
                description: Custom labels applied to all managed resources.
                type: object
                additionalProperties:
                  type: string
                x-kubernetes-preserve-unknown-fields: true
              helmProviderConfigRef:
                description: Reference to the Helm ProviderConfig. Defaults to clusterName.
                type: object
                properties:
                  name:
                    type: string
                  kind:
                    type: string
                    enum:
                    - ProviderConfig
                    - ClusterProviderConfig
              kubernetesProviderConfigRef:
                description: Reference to the Kubernetes ProviderConfig for namespace and bootstrap secret projection. Defaults to clusterName.
                type: object
                properties:
                  name:
                    type: string
                  kind:
                    type: string
                    enum:
                    - ProviderConfig
                    - ClusterProviderConfig
              namespace:
                description: Namespace for the Zitadel install. Defaults to "zitadel".
                type: string
              version:
                description: Zitadel Helm chart version. Defaults to the platform-pinned version.
                type: string
              domain:
                description: External hostname (e.g. "auth.example.com"). Drives chart externalDomain, ingress/HTTPRoute hostnames, and the OIDC issuer URL.
                type: string
              externalSecure:
                description: Whether the external endpoint terminates TLS. True for production (behind a TLS-terminating proxy/gateway). False only for local-dev clusters without TLS at the edge.
                type: boolean
                default: true
              firstInstance:
                description: Bootstrap configuration for the initial Zitadel instance. The chart's setup hook creates the default org plus iam-admin and login-client machine users with PATs in chart-managed secrets; this stack projects those refs into status.bootstrap.
                type: object
                properties:
                  enabled:
                    description: Run the chart's FirstInstance bootstrap. Defaults to true. Set false for "join existing instance" cases.
                    type: boolean
                    default: true
                  org:
                    description: Default organization name. Defaults to "ZITADEL" (chart default).
                    type: string
                  masterkey:
                    description: |
                      32-character symmetric encryption key for at-rest crypto. Required by the
                      chart on first install (it hard-fails without one). Set exactly one of
                      `secretRef` (production) or `inline` (dev only). Losing this key bricks the
                      install — back it up.
                    type: object
                    properties:
                      secretRef:
                        description: Reference to a Kubernetes Secret holding the masterkey. Wires to chart `zitadel.masterkeySecretName`. Mutually exclusive with `inline`.
                        type: object
                        properties:
                          name:
                            type: string
                        required:
                        - name
                      inline:
                        description: 32-character masterkey value. Dev only — leaks the key into the XR. Mutually exclusive with `secretRef`.
                        type: string
                  iamAdmin:
                    description: IAM admin machine user.
                    type: object
                    properties:
                      username:
                        description: Username. Defaults to "iam-admin".
                        type: string
                      patExpiration:
                        description: PAT expiration timestamp (RFC 3339). Defaults to "2029-01-01T00:00:00Z" (chart default).
                        type: string
                  loginClient:
                    description: Login client machine user.
                    type: object
                    properties:
                      username:
                        description: Username. Defaults to "login-client".
                        type: string
                      patExpiration:
                        description: PAT expiration timestamp (RFC 3339). Defaults to "2029-01-01T00:00:00Z" (chart default).
                        type: string
                required:
                - masterkey
              database:
                description: |
                  Database backend for Zitadel. Set exactly one of:
                    * `embedded` — AuthStack composes its own PSQLCluster, owns
                      the lifecycle (delete-cascades). Defaults are tuned for a
                      single-tenant Zitadel install. Cleanest UX for local-dev
                      and single-AuthStack-per-cluster.
                    * `psqlClusterRef` — BYO existing PSQLCluster. Escape hatch
                      for shared-cluster topologies, pre-provisioned DBs, or
                      multi-tenant fan-out.
                    * `external` — BYO Postgres DSN. Managed Postgres, RDS, etc.
                type: object
                properties:
                  embedded:
                    description: |
                      Compose a `PSQLCluster` XR owned by this AuthStack. The
                      composed PSQLCluster's data plane (CNPG Cluster + Secrets)
                      lands in the AuthStack's install namespace so Zitadel pods
                      can mount the app Secret via env-var `secretKeyRef`
                      natively — no cross-namespace mirror needed. Defaults
                      target a 2Gi single-instance Postgres suitable for a
                      single Zitadel install.
                    type: object
                    properties:
                      instances:
                        description: Number of Postgres instances. Defaults to 1.
                        type: integer
                        default: 1
                      storage:
                        description: Postgres data PVC sizing. Online expansion is supported when the StorageClass allows it.
                        type: object
                        properties:
                          size:
                            description: PVC size. Defaults to "2Gi".
                            type: string
                            default: "2Gi"
                          class:
                            description: StorageClass name. Defaults to "psql" (the platform's psql-stack StorageClass).
                            type: string
                            default: psql
                      postgresql:
                        description: Postgres version + tuning parameters.
                        type: object
                        properties:
                          version:
                            description: Postgres major version. Defaults to "17".
                            type: string
                            default: "17"
                          parameters:
                            description: postgres.conf parameters merged into the composed Cluster.spec.postgresql.parameters.
                            type: object
                            additionalProperties:
                              type: string
                            x-kubernetes-preserve-unknown-fields: true
                      app:
                        description: |
                          Application user — the Postgres role Zitadel connects
                          as. Defaults to role `zitadel`, database `zitadel`,
                          CNPG-generated basic-auth Secret. Set `externalSecret`
                          to source credentials from a SecretStore (production).
                        type: object
                        properties:
                          role:
                            description: Postgres role name. Defaults to "zitadel".
                            type: string
                            default: zitadel
                          database:
                            description: Application database name. Defaults to "zitadel".
                            type: string
                            default: zitadel
                          externalSecret:
                            description: Source credentials via External Secrets Operator. Remote value must be a JSON blob with `username` and `password` properties.
                            type: object
                            properties:
                              secretStore:
                                type: object
                                properties:
                                  kind:
                                    type: string
                                    enum:
                                    - ClusterSecretStore
                                    - SecretStore
                                    default: ClusterSecretStore
                                  name:
                                    type: string
                                  namespace:
                                    type: string
                                required:
                                - name
                              secretRef:
                                type: object
                                properties:
                                  path:
                                    type: string
                                required:
                                - path
                            required:
                            - secretStore
                            - secretRef
                      ha:
                        description: HA mode — bumps instances and adds zonal topology spread.
                        type: object
                        properties:
                          enabled:
                            type: boolean
                            default: false
                          replicas:
                            type: integer
                            default: 3
                          topologySpreadByZone:
                            type: boolean
                            default: true
                      monitoring:
                        description: Enable Prometheus PodMonitor. Defaults on.
                        type: object
                        properties:
                          enabled:
                            type: boolean
                            default: true
                      sslMode:
                        description: SSL mode Zitadel uses to connect to Postgres. Defaults to "disable" (in-cluster, same namespace).
                        type: string
                        enum:
                        - disable
                        - allow
                        - prefer
                        - require
                        - verify-ca
                        - verify-full
                        default: disable
                      cnpg:
                        description: Direct passthrough into the composed PSQLCluster's `cnpg` escape hatch for novel CNPG features.
                        type: object
                        properties:
                          values:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                          overrideAllValues:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                    required:
                    - storage
                  psqlClusterRef:
                    description: |
                      Reference to a `PSQLCluster` XR. AuthStack wires Zitadel's individual
                      Postgres env vars (host/port/database/user+password/admin+password)
                      from the PSQLCluster's chart-managed Secrets — no DSN string round-trip.
                      Convention: host = `<name>-rw.<namespace>.svc.cluster.local`, port 5432,
                      database = `app`. App credentials are read from `<name>-app`, admin
                      credentials from `<name>-superuser`.
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        description: Namespace of the PSQLCluster. Defaults to the AuthStack namespace.
                        type: string
                      sslMode:
                        description: SSL mode for the connection. Defaults to "disable" (in-cluster).
                        type: string
                        enum:
                        - disable
                        - allow
                        - prefer
                        - require
                        - verify-ca
                        - verify-full
                    required:
                    - name
                  external:
                    description: Bring your own connection. Provide a Secret containing the Postgres DSN.
                    type: object
                    properties:
                      dsnSecretRef:
                        description: Reference to a Secret containing the Postgres DSN. The chart reads ZITADEL_DATABASE_POSTGRES_DSN from this secret.
                        type: object
                        properties:
                          name:
                            type: string
                          namespace:
                            description: Namespace of the secret. Defaults to the AuthStack namespace.
                            type: string
                          key:
                            description: Key in the secret containing the DSN. Defaults to "dsn".
                            type: string
                        required:
                        - name
                    required:
                    - dsnSecretRef
              externalSecrets:
                description: |
                  ExternalSecrets Operator integration. Two flows:

                  PULL (durable inputs): AuthStack projects `masterkey` and
                  `admin-password` from a single AWS SM secret keyed by
                  `secretPath`. Both values are seeded together by
                  `hops auth bootstrap <cluster>` and live as JSON properties
                  under one AWS SM entry:

                      AWS SM @ <secretPath>:
                        { "masterkey": "...", "admin-password": "..." }

                  PUSH (operational state): when `pushCredentials.enabled`
                  (defaults to the top-level `enabled`), AuthStack composes a
                  PushSecret on the target cluster that publishes the
                  chart-managed iam-admin PAT to AWS SM at the configured
                  path/property. Downstream consumers anywhere create their
                  own `ExternalSecret` + `zitadel.m.crossplane.io
                  ProviderConfig` referencing that AWS SM path — AuthStack
                  does NOT compose the PC itself. See
                  `examples/consumer-providerconfig.yaml`.
                type: object
                properties:
                  enabled:
                    description: Enable ExternalSecret + PushSecret composition. Defaults to false.
                    type: boolean
                  secretStoreName:
                    description: Name of the ClusterSecretStore. Defaults to "hops-aws-secrets-manager".
                    type: string
                  secretPath:
                    description: |
                      Path in AWS Secrets Manager (e.g. `<cluster>/zitadel`).
                      The remote secret must be a JSON blob with two string
                      properties: `masterkey` and `admin-password`.
                    type: string
                  pushCredentials:
                    description: |
                      Publish the chart-managed iam-admin PAT to AWS SM via
                      ESO PushSecret. The PAT is written as a property of a
                      multi-property AWS SM entry; static config fields
                      (`domain`, `port`, `insecure`) are NOT pushed — consumers
                      assemble the final `credentials` JSON in their
                      ExternalSecret template, using `status.oidc.issuerURL`
                      from this AuthStack as the source of truth for `domain`.
                    type: object
                    default: {}
                    properties:
                      enabled:
                        description: |
                          Compose the PushSecret. Defaults to the top-level
                          `externalSecrets.enabled` value.
                        type: boolean
                      path:
                        description: |
                          AWS Secrets Manager path the PAT is pushed to.
                          Defaults to `push/<clusterName>/zitadel-credentials`.
                          The top-level `push/` prefix lets the ESO IRSA
                          role's write IAM permissions be scoped with one
                          wildcard (`arn:...:secret:push/*`), separate from
                          the broader read scope used for hand-seeded
                          durable secrets like `<cluster>/zitadel`.
                        type: string
                      accessTokenProperty:
                        description: |
                          Property key within the AWS SM entry that holds the
                          PAT. Defaults to `access_token` to match the
                          Terraform provider's attribute name (see
                          [[reference-zitadel-pc-credentials-shape]]).
                        type: string
              gateway:
                description: Gateway API routing for the Zitadel install. When enabled, drives the chart's gateway.httpRoute and gateway.grpcRoute. When disabled, the chart's ClusterIP service is left for the consumer to wire.
                type: object
                properties:
                  enabled:
                    description: Render Gateway API routes. Defaults to false.
                    type: boolean
                  parentRef:
                    description: Gateway parentRef to attach the routes to.
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      sectionName:
                        type: string
              chartValues:
                description: Escape hatch — Helm values merged on top of stack-rendered values. Prefer typed top-level fields when a knob proves load-bearing.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              overrideAllValues:
                description: Helm values that replace all stack-rendered defaults. Use only when the stack's typed surface gets in your way.
                type: object
                x-kubernetes-preserve-unknown-fields: true
            required:
            - clusterName
            - domain
            - database
          status:
            description: AuthStackStatus surfaces the OIDC contract and chart-managed bootstrap secret refs.
            type: object
            properties:
              ready:
                description: Overall readiness of the auth stack.
                type: boolean
              oidc:
                description: OIDC endpoints downstream consumers wire to.
                type: object
                properties:
                  issuerURL:
                    description: OIDC issuer URL (e.g. https://auth.example.com).
                    type: string
                  discoveryURL:
                    description: OIDC discovery URL (issuer + /.well-known/openid-configuration).
                    type: string
              providerConfig:
                description: |
                  Where to find the iam-admin PAT in AWS Secrets Manager.
                  Populated when `spec.externalSecrets.pushCredentials.enabled`.
                  Consumers anywhere build their own ExternalSecret + Zitadel
                  ProviderConfig referencing this path. See
                  `examples/consumer-providerconfig.yaml` for the canonical
                  consumer manifest.
                type: object
                properties:
                  awsSecretsManagerPath:
                    description: AWS SM secret path holding the PAT (e.g. `<cluster>/pushed/zitadel-credentials`).
                    type: string
                  accessTokenProperty:
                    description: Property key within the AWS SM entry containing the PAT (defaults to `access_token`).
                    type: string
              bootstrap:
                description: References to chart-managed bootstrap secrets. Populated after the chart's setup hook completes.
                type: object
                properties:
                  iamAdminPatSecretRef:
                    description: Secret holding the iam-admin machine-user PAT. Consumed by the Zitadel Crossplane provider and by ad-hoc admin tooling.
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      key:
                        type: string
                  iamAdminKeySecretRef:
                    description: Secret holding the iam-admin machine-user JWT key.
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      key:
                        type: string
                  loginClientPatSecretRef:
                    description: Secret holding the login-client machine-user PAT.
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      key:
                        type: string
        required:
        - spec
